<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}

.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}

.timer{font-size:22px;font-weight:bold;color:#d9534f}

/* ===== FRAME SOAL ===== */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin:12px 0;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:8px;
}

.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.team{background:#f0f0f0;padding:10px;border-radius:8px}
.active{background:#4caf50;color:#fff;font-weight:bold}

.question{text-align:left;font-size:22px;margin:10px 0}

.question-img,
.focus-img{
  max-width:280px;
  border-radius:10px;
  margin:10px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer,#winnerLayer{
  display:none;
  position:fixed;
  inset:0;
  background:white;
  z-index:9999;
  padding:16px;
}

.focusBox,.winnerBox{max-width:800px;margin:auto}

.focusQ{font-size:22px;margin-bottom:10px}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
<h1>🎮 Kuis Matematika</h1>

<div id="timer" class="timer"></div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div id="questionInfo"></div>

<!-- ✅ FRAME SOAL -->
<div class="question-frame">
  <div id="question" class="question"></div>
  <img id="questionImg" class="question-img">
</div>

<div id="options" class="options"></div>

<button onclick="prevQuestion()">◀ Sebelumnya</button>
<button onclick="nextQuestion()">▶ Berikutnya</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button onclick="showFocus()">📘 Pembahasan</button>
<button onclick="showWinners()">🏆 Juara</button>

<div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div id="focusInfo"></div>
    <div class="question-frame">
      <div id="focusQuestion" class="focusQ"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<!-- JUARA -->
<div id="winnerLayer">
  <div class="winnerBox">
    <h2>🏆 Pemenang</h2>
    <div id="winnerContent"></div>
    <button onclick="closeWinner()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Sebuah kotak hadiah berbentuk kubus akan dibungkus kertas kado. Jika panjang sisi kotak adalah 12 cm, berapa luas kertas minimal yang dibutuhkan untuk membungkus seluruh permukaan kotak tersebut?",
options:["144 cm²","288 cm²","864 cm²","1.728 cm²"],
correct:"864 cm²",
p:"Luas permukaan kubus adalah 6 × s². Dengan s = 12 cm diperoleh luas = 6 × 12² = 6 × 144 = 864 cm². Jadi, kertas kado minimal yang dibutuhkan adalah 864 cm².",
img:""
},

{
q:"Sebuah akuarium berbentuk balok memiliki panjang 40 cm, lebar 25 cm, dan tinggi 30 cm. Berapa volume air maksimum yang dapat ditampung akuarium tersebut?",
options:["7.500 cm³","15.000 cm³","30.000 cm³","45.000 cm³"],
correct:"30.000 cm³",
p:"Volume balok dihitung dengan rumus V = p × l × t. Volume akuarium = 40 × 25 × 30 = 30.000 cm³.",
img:""
},

{
q:"Sebuah prisma segitiga memiliki alas segitiga dengan panjang alas 10 cm dan tinggi segitiga 8 cm. Tinggi prisma adalah 15 cm. Hitung volume prisma tersebut.",
options:["600 cm³","800 cm³","1.200 cm³","2.400 cm³"],
correct:"600 cm³",
p:"Luas alas segitiga = 1/2 × 10 × 8 = 40 cm². Volume prisma = luas alas × tinggi prisma = 40 × 15 = 600 cm³. Kunci sebelumnya pada soal tertulis tidak konsisten dan telah diperbaiki.",
img:""
},

{
q:"Sebuah limas segiempat memiliki alas berbentuk persegi dengan panjang sisi 9 cm. Tinggi limas adalah 12 cm. Hitung volume limas tersebut.",
options:["81 cm³","243 cm³","324 cm³","972 cm³"],
correct:"324 cm³",
p:"Luas alas persegi = 9 × 9 = 81 cm². Volume limas = 1/3 × luas alas × tinggi = 1/3 × 81 × 12 = 324 cm³. Kunci jawaban awal tidak sesuai dan telah diperbaiki.",
img:""
},

{
q:"Sebuah kardus berbentuk balok berukuran panjang 50 cm, lebar 30 cm, dan tinggi 20 cm akan dilapisi plastik. Berapakah luas plastik minimal yang dibutuhkan untuk melapisi seluruh permukaan kardus tersebut?",
options:["2.400 cm²","3.000 cm²","4.400 cm²","6.200 cm²"],
correct:"6.200 cm²",
p:"Luas permukaan balok adalah 2(pl + pt + lt). Dengan p = 50, l = 30, t = 20 diperoleh L = 2(50×30 + 50×20 + 30×20) = 2(1500 + 1000 + 600) = 2 × 3100 = 6200 cm².",
img:""
}

];


let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);
let quizSelesai=false;

/* SOAL */
function showQuestion(){
  let q=questions[currentQuestion];
  questionInfo.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  feedback.textContent=answered[currentQuestion]?"✔ Sudah dijawab":"";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  let q=questions[currentQuestion];
  if(ans===q.correct){
    btn.classList.add("correct");
    scores[currentTeam]++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    wrongs[currentTeam]++;
    feedback.textContent="❌ Salah";
  }
  updateScore();

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    timer.textContent="⏰ Selesai — REVIEW";
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* REGU */
function switchTeam(){
  document.querySelector(".active").classList.remove("active");
  currentTeam=(currentTeam+1)%4;
  document.getElementById("team"+(currentTeam+1)).classList.add("active");
}
function updateScore(){
  for(let i=0;i<4;i++){
    document.getElementById("team"+(i+1)).textContent=
    `Regu ${i+1} | Skor ${scores[i]-wrongs[i]}`;
  }
}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusInfo.textContent=`Soal ${currentQuestion+1}`;
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#aaa'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){focusLayer.style.display="none";quiz.style.display="block";}

/* JUARA */
function showWinners(){
  let rank=[0,1,2,3].map(i=>({team:i+1,score:scores[i]-wrongs[i]}))
    .sort((a,b)=>b.score-a.score);

  winnerContent.innerHTML=rank.map((r,i)=>
    `<p>Juara ${i+1}: <b>Regu ${r.team}</b> (Skor ${r.score})</p>`
  ).join("");

  quiz.style.display="none";
  winnerLayer.style.display="block";
}
function closeWinner(){winnerLayer.style.display="none";quiz.style.display="block";}

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* INIT */
updateScore();
showQuestion();
</script>

</body>
</html>
