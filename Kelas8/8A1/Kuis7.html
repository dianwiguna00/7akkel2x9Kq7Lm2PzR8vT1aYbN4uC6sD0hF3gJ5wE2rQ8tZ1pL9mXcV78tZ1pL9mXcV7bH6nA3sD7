<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}

.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}

.timer{font-size:22px;font-weight:bold;color:#d9534f}

/* ===== FRAME SOAL ===== */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin:12px 0;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:8px;
}

.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.team{background:#f0f0f0;padding:10px;border-radius:8px}
.active{background:#4caf50;color:#fff;font-weight:bold}

.question{text-align:left;font-size:22px;margin:10px 0}

.question-img,
.focus-img{
  max-width:280px;
  border-radius:10px;
  margin:10px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer,#winnerLayer{
  display:none;
  position:fixed;
  inset:0;
  background:white;
  z-index:9999;
  padding:16px;
}

.focusBox,.winnerBox{max-width:800px;margin:auto}

.focusQ{font-size:22px;margin-bottom:10px}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
<h1>🎮 Kuis Matematika</h1>

<div id="timer" class="timer"></div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div id="questionInfo"></div>

<!-- ✅ FRAME SOAL -->
<div class="question-frame">
  <div id="question" class="question"></div>
  <img id="questionImg" class="question-img">
</div>

<div id="options" class="options"></div>

<button onclick="prevQuestion()">◀ Sebelumnya</button>
<button onclick="nextQuestion()">▶ Berikutnya</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button onclick="showFocus()">📘 Pembahasan</button>
<button onclick="showWinners()">🏆 Juara</button>

<div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div id="focusInfo"></div>
    <div class="question-frame">
      <div id="focusQuestion" class="focusQ"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<!-- JUARA -->
<div id="winnerLayer">
  <div class="winnerBox">
    <h2>🏆 Pemenang</h2>
    <div id="winnerContent"></div>
    <button onclick="closeWinner()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Diberikan relasi antara siswa dan nilai ulangan:\n- Andi → 80\n- Budi → 85\n- Citra → 90\nApa domain dari relasi tersebut?",
options:["{80, 85, 90}","{Andi, Budi, Citra}","{Nilai Ulangan}","{Siswa dan Nilai}"],
correct:"{Andi, Budi, Citra}",
p:"Domain adalah himpunan semua input (unsur pertama) dari suatu relasi. Pada relasi tersebut, unsur pertamanya adalah nama siswa, yaitu Andi, Budi, dan Citra.",
img:""
},
{
q:"Relasi antara hari dan kegiatan:\n- Senin → Upacara\n- Selasa → Matematika\n- Rabu → IPA\n- Kamis → Bahasa\n- Jumat → Seni\nApa kodomain dari relasi tersebut?",
options:["{Senin, Selasa, Rabu, Kamis, Jumat}","{Upacara, Matematika, IPA, Bahasa, Seni}","{Upacara, Matematika, IPA, Bahasa, Seni, Olahraga, Prakarya}","{Hari dan Kegiatan}"],
correct:"{Upacara, Matematika, IPA, Bahasa, Seni, Olahraga, Prakarya}",
p:"Kodomain adalah himpunan semua nilai yang mungkin menjadi pasangan dari domain, baik yang muncul maupun tidak muncul dalam relasi. Karena kegiatan yang mungkin lebih luas dari yang tercantum, kodomainnya mencakup semua kegiatan yang mungkin.",
img:""
},
{
q:"Dalam relasi antara siswa dan ekstrakurikuler yang diikuti:\n- Dika → Basket\n- Rani → Tari\n- Sinta → Basket\nApa range dari relasi tersebut?",
options:["{Dika, Rani, Sinta}","{Basket, Tari}","{Basket, Tari, Musik}","{Ekstrakurikuler}"],
correct:"{Basket, Tari}",
p:"Range adalah himpunan semua output yang benar-benar muncul dalam relasi. Dari data tersebut, kegiatan yang muncul hanyalah Basket dan Tari.",
img:""
},
{
q:"Relasi antara nomor rumah dan pemilik rumah:\n- 01 → Pak Budi\n- 02 → Bu Rina\n- 03 → Pak Joko\nApakah relasi tersebut merupakan fungsi?",
options:["Ya, karena setiap nomor rumah memiliki satu pemilik","Tidak, karena satu pemilik bisa memiliki banyak rumah","Ya, karena semua rumah memiliki pemilik","Tidak, karena rumah bisa kosong"],
correct:"Ya, karena setiap nomor rumah memiliki satu pemilik",
p:"Suatu relasi disebut fungsi jika setiap elemen domain memiliki tepat satu pasangan di kodomain. Dalam relasi tersebut, setiap nomor rumah dipasangkan dengan satu pemilik, sehingga relasi ini adalah fungsi.",
img:""
},
{
q:"Diberikan relasi:\n- A → 75\n- B → 80\n- C → 90\nDomain dari relasi tersebut adalah ...",
options:["{75, 80, 90}","{A, B, C}","{Nilai siswa}","{0–100}"],
correct:"{A, B, C}",
p:"Domain adalah himpunan semua elemen pertama pada relasi. Pada relasi ini, elemen pertamanya adalah A, B, dan C.",
img:""
}

];

let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);
let quizSelesai=false;

/* SOAL */
function showQuestion(){
  let q=questions[currentQuestion];
  questionInfo.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  feedback.textContent=answered[currentQuestion]?"✔ Sudah dijawab":"";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  let q=questions[currentQuestion];
  if(ans===q.correct){
    btn.classList.add("correct");
    scores[currentTeam]++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    wrongs[currentTeam]++;
    feedback.textContent="❌ Salah";
  }
  updateScore();

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    timer.textContent="⏰ Selesai — REVIEW";
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* REGU */
function switchTeam(){
  document.querySelector(".active").classList.remove("active");
  currentTeam=(currentTeam+1)%4;
  document.getElementById("team"+(currentTeam+1)).classList.add("active");
}
function updateScore(){
  for(let i=0;i<4;i++){
    document.getElementById("team"+(i+1)).textContent=
    `Regu ${i+1} | Skor ${scores[i]-wrongs[i]}`;
  }
}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusInfo.textContent=`Soal ${currentQuestion+1}`;
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#aaa'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){focusLayer.style.display="none";quiz.style.display="block";}

/* JUARA */
function showWinners(){
  let rank=[0,1,2,3].map(i=>({team:i+1,score:scores[i]-wrongs[i]}))
    .sort((a,b)=>b.score-a.score);

  winnerContent.innerHTML=rank.map((r,i)=>
    `<p>Juara ${i+1}: <b>Regu ${r.team}</b> (Skor ${r.score})</p>`
  ).join("");

  quiz.style.display="none";
  winnerLayer.style.display="block";
}
function closeWinner(){winnerLayer.style.display="none";quiz.style.display="block";}

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* INIT */
updateScore();
showQuestion();
</script>

</body>
</html>
