<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}

.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}

.timer{font-size:22px;font-weight:bold;color:#d9534f}

/* ===== FRAME SOAL ===== */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin:12px 0;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:8px;
}

.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.team{background:#f0f0f0;padding:10px;border-radius:8px}
.active{background:#4caf50;color:#fff;font-weight:bold}

.question{text-align:left;font-size:22px;margin:10px 0}

.question-img,
.focus-img{
  max-width:280px;
  border-radius:10px;
  margin:10px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer,#winnerLayer{
  display:none;
  position:fixed;
  inset:0;
  background:white;
  z-index:9999;
  padding:16px;
}

.focusBox,.winnerBox{max-width:800px;margin:auto}

.focusQ{font-size:22px;margin-bottom:10px}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
<h1>🎮 Kuis Matematika</h1>

<div id="timer" class="timer"></div>

<div class="score-board">
  <div id="team1" class="team active"></div>
  <div id="team2" class="team"></div>
  <div id="team3" class="team"></div>
  <div id="team4" class="team"></div>
</div>

<div id="questionInfo"></div>

<!-- ✅ FRAME SOAL -->
<div class="question-frame">
  <div id="question" class="question"></div>
  <img id="questionImg" class="question-img">
</div>

<div id="options" class="options"></div>

<button onclick="prevQuestion()">◀ Sebelumnya</button>
<button onclick="nextQuestion()">▶ Berikutnya</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button onclick="showFocus()">📘 Pembahasan</button>
<button onclick="showWinners()">🏆 Juara</button>

<div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div id="focusInfo"></div>
    <div class="question-frame">
      <div id="focusQuestion" class="focusQ"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<!-- JUARA -->
<div id="winnerLayer">
  <div class="winnerBox">
    <h2>🏆 Pemenang</h2>
    <div id="winnerContent"></div>
    <button onclick="closeWinner()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Seorang pedagang membeli 10 kotak pensil seharga Rp150.000. Ia menjualnya seharga Rp12.000 per kotak. Berapa total harga jualnya?\n",
options:["Rp120.000","Rp130.000","Rp140.000","Rp150.000"],
correct:"Rp120.000",
p:"Total harga jual dihitung dengan mengalikan jumlah kotak dengan harga jual per kotak. Total harga jual = 10 × Rp12.000 = Rp120.000. Jadi total harga jualnya adalah Rp120.000.",
img:""
},
{
q:"Pak Budi membeli sepeda bekas seharga Rp1.200.000 dan menjualnya kembali seharga Rp1.050.000. Apakah Pak Budi mengalami untung atau rugi?\n",
options:["Untung Rp150.000","Rugi Rp150.000","Untung Rp50.000","Rugi Rp50.000"],
correct:"Rugi Rp150.000",
p:"Karena harga jual lebih kecil daripada harga beli, maka Pak Budi mengalami kerugian. Besar rugi = Rp1.200.000 − Rp1.050.000 = Rp150.000.",
img:""
},
{
q:"Harga beli sebuah tas adalah Rp80.000 dan dijual dengan harga Rp95.000. Berapa keuntungan yang diperoleh?\n",
options:["Rp10.000","Rp15.000","Rp20.000","Rp25.000"],
correct:"Rp15.000",
p:"Keuntungan diperoleh dari selisih harga jual dan harga beli. Untung = Rp95.000 − Rp80.000 = Rp15.000.",
img:""
},
{
q:"Seorang pedagang membeli 1 lusin buku tulis seharga Rp48.000 dan menjual seluruhnya seharga Rp60.000. Berapa keuntungan per buku?\n",
options:["Rp1.000","Rp2.000","Rp3.000","Rp4.000"],
correct:"Rp1.000",
p:"Harga beli per buku = Rp48.000 ÷ 12 = Rp4.000 dan harga jual per buku = Rp60.000 ÷ 12 = Rp5.000. Keuntungan per buku = Rp5.000 − Rp4.000 = Rp1.000.",
img:""
},
{
q:"Seorang penjual membeli 5 buah kaos seharga Rp50.000 per kaos dan menjualnya masing-masing seharga Rp45.000. Berapa total kerugian yang dialami?\n",
options:["Rp25.000","Rp20.000","Rp15.000","Rp10.000"],
correct:"Rp25.000",
p:"Harga beli total = 5 × Rp50.000 = Rp250.000 dan harga jual total = 5 × Rp45.000 = Rp225.000. Kerugian = Rp250.000 − Rp225.000 = Rp25.000. Jadi penjual mengalami rugi sebesar Rp25.000.",
img:""
}

];

let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);
let quizSelesai=false;

/* SOAL */
function showQuestion(){
  let q=questions[currentQuestion];
  questionInfo.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  feedback.textContent=answered[currentQuestion]?"✔ Sudah dijawab":"";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  let q=questions[currentQuestion];
  if(ans===q.correct){
    btn.classList.add("correct");
    scores[currentTeam]++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    wrongs[currentTeam]++;
    feedback.textContent="❌ Salah";
  }
  updateScore();

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    timer.textContent="⏰ Selesai — REVIEW";
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* REGU */
function switchTeam(){
  document.querySelector(".active").classList.remove("active");
  currentTeam=(currentTeam+1)%4;
  document.getElementById("team"+(currentTeam+1)).classList.add("active");
}
function updateScore(){
  for(let i=0;i<4;i++){
    document.getElementById("team"+(i+1)).textContent=
    `Regu ${i+1} | Skor ${scores[i]-wrongs[i]}`;
  }
}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusInfo.textContent=`Soal ${currentQuestion+1}`;
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#aaa'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){focusLayer.style.display="none";quiz.style.display="block";}

/* JUARA */
function showWinners(){
  let rank=[0,1,2,3].map(i=>({team:i+1,score:scores[i]-wrongs[i]}))
    .sort((a,b)=>b.score-a.score);

  winnerContent.innerHTML=rank.map((r,i)=>
    `<p>Juara ${i+1}: <b>Regu ${r.team}</b> (Skor ${r.score})</p>`
  ).join("");

  quiz.style.display="none";
  winnerLayer.style.display="block";
}
function closeWinner(){winnerLayer.style.display="none";quiz.style.display="block";}

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* INIT */
updateScore();
showQuestion();
</script>

</body>
</html>
